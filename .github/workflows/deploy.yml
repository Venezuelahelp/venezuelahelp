name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to redeploy for rollback (e.g. v1.2.3)"
        required: true

permissions:
  id-token: write # OIDC token for AWS
  contents: write # create tags and releases

# Serializa los deploys: dos merges a main casi simultáneos lanzaban dos
# `cdk deploy --all` a la vez que chocaban en FrontendStack (UPDATE_IN_PROGRESS).
# cancel-in-progress: false → un run nuevo ESPERA a que termine el actual (no lo
# cancela a mitad, que dejaría stacks a medio actualizar). Como cdk despliega el
# HEAD acumulado de main, el run en cola cubre igual los cambios intermedios.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  version:
    name: Version
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  deploy:
    name: Deploy
    needs: [test, version]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
